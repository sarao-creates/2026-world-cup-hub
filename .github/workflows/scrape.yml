name: Refresh NYC watch parties

# NOTE: no cron schedule — Eventbrite blocks GitHub-hosted runner IPs (HTTP 405
# on every attempt), so scheduled runs only ever produce failure emails.
# Refresh locally instead: `npm run scrape` + push. Manual dispatch kept for
# retrying from CI if Eventbrite ever unblocks.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: python3 scripts/scrape_watchparties.py
      - name: Commit updated data
        run: |
          git config user.name "watch-party-bot"
          git config user.email "actions@github.com"
          git add data/watchparties.json
          git diff --cached --quiet || git commit -m "Refresh watch party data"
          git push
